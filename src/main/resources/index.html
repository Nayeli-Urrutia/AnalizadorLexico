<!DOCTYPE html>
<html>
<head>
    <title>Analizador de Codigo</title>

    <style>

        body{
            background:#0f172a;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .contenedor{
            background:#1e293b;
            padding:40px;
            border-radius:12px;
            width:700px;
            box-shadow:0px 0px 25px rgba(0,0,0,0.5);
        }

        h1{
            text-align:center;
            color:#38bdf8;
            margin-bottom:20px;
        }

        textarea{
            width:100%;
            height:120px;
            background:#0f172a;
            color:white;
            border:1px solid #334155;
            border-radius:6px;
            padding:10px;
            font-size:15px;
        }

        button{
            margin-top:15px;
            width:100%;
            padding:12px;
            background:#38bdf8;
            border:none;
            border-radius:6px;
            color:black;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#0ea5e9;
        }

        table{
            margin-top:20px;
            width:100%;
            border-collapse:collapse;
            background:#0f172a;
            color:white;
        }

        th,td{
            padding:10px;
            border:1px solid #334155;
            text-align:left;
        }

        th{
            background:#38bdf8;
            color:black;
        }

        .error{
            color:#f87171;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="contenedor">

    <h1>Analizador Lexico</h1>

    <textarea id="codigo" placeholder="Escriba el codigo aqui"></textarea>

    <button onclick="analizar()">Analizar</button>

    <table id="tabla">

        <tr>
            <th>Token</th>
            <th>Tipo</th>
        </tr>

    </table>

</div>

<script>

    function analizar(){

        let codigo=document.getElementById("codigo").value;

        let tokens=codigo.match(/:=|>=|<=|<>|\.\.|[a-zA-Z][a-zA-Z0-9]*|\d+|[+\-*/=<>]|[{}\[\](),;]|[^\s]+/g);

        let tabla=document.getElementById("tabla");

        tabla.innerHTML="<tr><th>Token</th><th>Tipo</th></tr>";

        tokens.forEach(function(t){

            let tipo="";

            let reservadas=["if","else","for","print","int"];
            let operadores=["+","-","*","/"];
            let relacionales=[">=","<=","<",">","=","<>"];
            let simbolos=["{","}","[","]","(",")",",",";",".."];

            if(reservadas.includes(t))
                tipo="Palabra reservada";

            else if(/^[a-zA-Z][a-zA-Z0-9]{0,9}$/.test(t))
                tipo="Identificador";

            else if(/^(100|[0-9]{1,2})$/.test(t))
                tipo="Numero";

            else if(operadores.includes(t))
                tipo="Operador aritmetico";

            else if(t==":=")
                tipo="Asignacion";

            else if(relacionales.includes(t))
                tipo="Operador relacional";

            else if(simbolos.includes(t))
                tipo="Simbolo";

            else if(t.startsWith("123"))
                tipo="Error semantico";

            else if(t.includes("@"))
                tipo="Error sintactico";

            else if(t=="while")
                tipo="Error logico";

            else
                tipo="Error lexico";

            let fila="<tr>";

            if(tipo.includes("Error"))
                fila+="<td class='error'>"+t+"</td><td class='error'>"+tipo+"</td>";
            else
                fila+="<td>"+t+"</td><td>"+tipo+"</td>";

            fila+="</tr>";

            tabla.innerHTML+=fila;

        });

    }

</script>

</body>
</html>
